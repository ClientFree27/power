name: macOS VNC
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Install cloudflared
        run: |
          brew install cloudflare/cloudflare/cloudflared

      - name: Create Admin user with password from secret
        run: |
          sudo dscl . -create /Users/Admin
          sudo dscl . -create /Users/Admin UserShell /bin/bash
          sudo dscl . -create /Users/Admin RealName "Admin User"
          sudo dscl . -create /Users/Admin UniqueID 510
          sudo dscl . -create /Users/Admin PrimaryGroupID 20
          sudo dscl . -create /Users/Admin NFSHomeDirectory /Users/Admin
          sudo dscl . -passwd /Users/Admin ${{ secrets.ADMIN_PASSWORD }}
          sudo dscl . -append /Groups/admin GroupMembership Admin

      - name: Enable VNC service
        run: |
          sudo systemsetup -setremotelogin on
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAlwaysStartOnConsole -bool true
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -privs -all

      - name: Start Cloudflare Tunnel
        run: |
          cloudflared tunnel --url tcp://localhost:5900 > cloudflared.log &
          sleep 5
          echo "======================================"
          echo " Connect to macOS via VNC using:"
          tail -n 10 cloudflared.log
          echo " Username: Admin"
          echo " Password: (value stored in ADMIN_PASSWORD secret)"
          echo "======================================"

      - name: Keep tunnel alive
        run: tail -f cloudflared.log
