name: macOS RDP
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Install Homebrew and required packages
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          brew install wget jq ngrok

      - name: Configure ngrok
        run: |
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Enable VNC service
        run: |
          sudo systemsetup -setremotelogin on
          sudo defaults write /Library/Preferences/com.apple.RemoteManagement VNCAlwaysStartOnConsole -bool true
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on -restart -agent -privs -all

      - name: Start ngrok tunnel and show connection
        run: |
          ngrok tcp 5900 > ngrok.log &
          sleep 5
          echo "======================================"
          echo " Connect to macOS via VNC using:"
          curl -s localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' | sed 's#tcp://##'
          echo "======================================"
          # Keep the job alive so ngrok stays running
          tail -f ngrok.log

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v2
